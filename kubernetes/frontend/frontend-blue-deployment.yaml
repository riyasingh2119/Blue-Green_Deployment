apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-blue

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend
      version: blue

  template:
    metadata:
      labels:
        app: frontend
        version: blue

    spec:
      containers:
        - name: frontend
          image: frontend:blue
          imagePullPolicy: Never

          ports:
            - containerPort: 3000